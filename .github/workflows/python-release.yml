name: python release

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Python package registry"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi
      version:
        description: "Version to publish, without leading v"
        required: true
        type: string

permissions:
  contents: read

jobs:
  metadata:
    name: metadata
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.release.outputs.environment }}
      package-name: ${{ steps.release.outputs.package-name }}
      repository: ${{ steps.release.outputs.repository }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          version="${{ inputs.version }}"
          version="${version#v}"
          repository="${{ inputs.repository }}"

          if [[ -z "$version" ]]; then
            echo "Python release version is required" >&2
            exit 1
          fi

          if [[ "$repository" == "testpypi" ]]; then
            package_name="konvert7-klint"
            environment="testpypi"
          elif [[ "$repository" == "pypi" ]]; then
            package_name="klint"
            environment="pypi"
          else
            echo "Unsupported Python package repository: $repository" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "repository=$repository" >> "$GITHUB_OUTPUT"
          echo "package-name=$package_name" >> "$GITHUB_OUTPUT"
          echo "environment=$environment" >> "$GITHUB_OUTPUT"

  build:
    name: build (${{ matrix.package }})
    needs: metadata
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            binary: klint-rs
          - os: macos-latest
            package: darwin-arm64
            rust-target: aarch64-apple-darwin
            binary: klint-rs
          - os: macos-latest
            package: darwin-x64
            rust-target: x86_64-apple-darwin
            binary: klint-rs
          - os: windows-latest
            package: win32-x64
            rust-target: x86_64-pc-windows-msvc
            binary: klint-rs.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal

      - name: Install Rust target
        run: rustup target add ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: python-release-${{ matrix.rust-target }}
          workspaces: |
            . -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native binary
        run: cargo build -p klint-rs --release --target ${{ matrix.rust-target }}

      - name: Stage Python wheel binary
        run: bun tests/stage-python-wheel.ts --source target/${{ matrix.rust-target }}/release/${{ matrix.binary }}

      - name: Stage Python release metadata
        run: bun tools/prepare-python-release.ts --name ${{ needs.metadata.outputs.package-name }} --version ${{ needs.metadata.outputs.version }}

      - name: Smoke Python wheel
        run: bun tests/smoke-python-wheel.ts

      - name: Upload Python wheel
        uses: actions/upload-artifact@v7
        with:
          name: python-release-${{ matrix.package }}
          path: python/dist/*.whl
          if-no-files-found: error

  publish:
    name: publish
    needs: [metadata, build]
    runs-on: ubuntu-latest
    environment: ${{ needs.metadata.outputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download Python wheels
        uses: actions/download-artifact@v4
        with:
          pattern: python-release-*
          path: python/dist
          merge-multiple: true

      - name: Publish to TestPyPI
        if: needs.metadata.outputs.repository == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: needs.metadata.outputs.repository == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
