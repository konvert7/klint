name: native artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Artifact version, without leading v"
        required: true
        type: string
      publish-release:
        description: "Create or update a GitHub Release with the native artifacts"
        required: true
        default: false
        type: boolean
      publish-brew:
        description: "Update konvert7/homebrew-tap Formula/klint.rb"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  metadata:
    name: metadata
    runs-on: ubuntu-latest
    outputs:
      publish-brew: ${{ steps.release.outputs.publish-brew }}
      publish-release: ${{ steps.release.outputs.publish-release }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Resolve artifact metadata
        id: release
        shell: bash
        run: |
          version="${{ inputs.version }}"
          version="${version#v}"
          publish_brew="${{ inputs.publish-brew }}"
          publish_release="${{ inputs.publish-release }}"

          if [[ -z "$version" ]]; then
            echo "Native artifact version is required" >&2
            exit 1
          fi
          if [[ "$publish_brew" == "true" && "$publish_release" != "true" ]]; then
            echo "publish-brew requires publish-release so formula URLs point at permanent assets" >&2
            exit 1
          fi

          tag="native-v$version"

          echo "publish-brew=$publish_brew" >> "$GITHUB_OUTPUT"
          echo "publish-release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          echo "Native artifact metadata:"
          echo "  version: $version"
          echo "  tag: $tag"
          echo "  publish brew: $publish_brew"
          echo "  publish release: $publish_release"

          {
            echo "## Native artifact metadata"
            echo ""
            echo "- Version: \`$version\`"
            echo "- Tag: \`$tag\`"
            echo "- Publish Brew: \`$publish_brew\`"
            echo "- Publish release: \`$publish_release\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: build (${{ matrix.package }})
    needs: metadata
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            binary: klint-rs
            archive: tar.gz
          - os: macos-latest
            package: darwin-arm64
            rust-target: aarch64-apple-darwin
            binary: klint-rs
            archive: tar.gz
          - os: macos-15-intel
            package: darwin-x64
            rust-target: x86_64-apple-darwin
            binary: klint-rs
            archive: tar.gz
          - os: windows-latest
            package: win32-x64
            rust-target: x86_64-pc-windows-msvc
            binary: klint-rs.exe
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal

      - name: Install Rust target
        run: rustup target add ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: native-artifacts-${{ matrix.rust-target }}
          workspaces: |
            . -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native binary
        run: cargo build -p klint-rs --release --target ${{ matrix.rust-target }}

      - name: Stage artifact directory
        shell: bash
        run: |
          artifact="klint-${{ needs.metadata.outputs.version }}-${{ matrix.package }}"
          mkdir -p "dist/$artifact"
          cp "target/${{ matrix.rust-target }}/release/${{ matrix.binary }}" "dist/$artifact/klint${{ runner.os == 'Windows' && '.exe' || '' }}"
          cp README.md "dist/$artifact/README.md"

      - name: Smoke artifact binary
        shell: bash
        run: |
          artifact="klint-${{ needs.metadata.outputs.version }}-${{ matrix.package }}"
          binary="dist/$artifact/klint"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            binary="dist/$artifact/klint.exe"
          fi

          "$binary" --version

          set +e
          output="$("$binary" --config tests/fixtures/swift-arch --json)"
          status="$?"
          set -e

          if [[ "$status" != "2" ]]; then
            echo "$output"
            echo "Expected Swift smoke fixture to exit 2, got $status" >&2
            exit 1
          fi

          echo "$output" | grep '"rule":"arch/imports"'
          echo "$output" | grep '"rule":"arch/forbidden"'
          echo "$output" | grep '"rule":"arch/singleton"'

      - name: Package tar archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          artifact="klint-${{ needs.metadata.outputs.version }}-${{ matrix.package }}"
          tar -czf "dist/$artifact.tar.gz" -C dist "$artifact"
          (
            cd dist
            shasum -a 256 "$artifact.tar.gz" > "$artifact.tar.gz.sha256"
          )

      - name: Package zip archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $artifact = "klint-${{ needs.metadata.outputs.version }}-${{ matrix.package }}"
          Compress-Archive -Path "dist/$artifact" -DestinationPath "dist/$artifact.zip"
          $hash = (Get-FileHash "dist/$artifact.zip" -Algorithm SHA256).Hash.ToLower()
          [System.IO.File]::WriteAllText("dist/$artifact.zip.sha256", "$hash  $artifact.zip`n", [System.Text.Encoding]::ASCII)

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: klint-${{ needs.metadata.outputs.version }}-${{ matrix.package }}
          path: |
            dist/klint-${{ needs.metadata.outputs.version }}-${{ matrix.package }}.${{ matrix.archive }}
            dist/klint-${{ needs.metadata.outputs.version }}-${{ matrix.package }}.${{ matrix.archive }}.sha256
          if-no-files-found: error

  release:
    name: release assets
    needs: [metadata, build]
    if: needs.metadata.outputs.publish-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: klint-${{ needs.metadata.outputs.version }}-*
          path: dist
          merge-multiple: true

      - name: Verify downloaded checksums
        shell: bash
        run: |
          cd dist
          shasum -a 256 -c *.sha256

      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ needs.metadata.outputs.tag }}"
          version="${{ needs.metadata.outputs.version }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --title "native artifacts $version" \
              --notes "Manual native artifacts for version $version."
          fi

      - name: Generate GitHub App Token for Homebrew tap
        if: needs.metadata.outputs.publish-brew == 'true'
        id: tap-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: konvert7
          repositories: homebrew-tap

      - name: Checkout Homebrew tap
        if: needs.metadata.outputs.publish-brew == 'true'
        uses: actions/checkout@v6
        with:
          repository: konvert7/homebrew-tap
          path: homebrew-tap
          token: ${{ steps.tap-token.outputs.token }}

      - name: Update Homebrew formula
        if: needs.metadata.outputs.publish-brew == 'true'
        shell: bash
        run: |
          version="${{ needs.metadata.outputs.version }}"
          arm64_sha="$(cut -d ' ' -f 1 "dist/klint-$version-darwin-arm64.tar.gz.sha256")"
          x64_sha="$(cut -d ' ' -f 1 "dist/klint-$version-darwin-x64.tar.gz.sha256")"

          bun tools/generate-homebrew-formula.ts \
            --version "$version" \
            --darwin-arm64-sha "$arm64_sha" \
            --darwin-x64-sha "$x64_sha" \
            --output homebrew-tap/Formula/klint.rb

          cd homebrew-tap
          git config user.name "klint release bot"
          git config user.email "actions@github.com"
          git add Formula/klint.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date"
          else
            git commit -m "chore(homebrew): update klint native $version"
            git push
          fi
