name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        continue-on-error: true
        run: bun audit --audit-level=high

      - name: Check (lint + format)
        run: bun run check

      - name: Type-check
        run: bun run type-check

      - name: Knip
        run: bun run knip

      - name: jscpd
        run: bun run jscpd

      - name: Klint
        run: bun run klint

      - name: Klint auto engine
        run: bun run test:auto-engine

      - name: Rust debug build
        run: cargo build -p klint-rs

      - name: Test
        run: bun run test

      - name: Rust shadow engine test
        run: bun run test:rust-engine

      - name: Rust format
        run: cargo fmt --check

      - name: Rust check
        run: cargo check -p klint-rs

      - name: Rust clippy
        run: cargo clippy -p klint-rs --all-targets -- -D warnings

      - name: Rust test
        run: cargo test -p klint-rs

      - name: Rust release build
        run: cargo build -p klint-rs --release

      - name: Stage native package binary
        run: bun run native:stage

      - name: Smoke native package binary
        run: bun run native:smoke

      - name: Pack check
        run: bun run pack:check

  native:
    name: native (${{ matrix.package }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            binary: klint-rs
          - os: macos-latest
            package: darwin-arm64
            rust-target: aarch64-apple-darwin
            binary: klint-rs
          - os: macos-latest
            package: darwin-x64
            rust-target: x86_64-apple-darwin
            binary: klint-rs
          - os: windows-latest
            package: win32-x64
            rust-target: x86_64-pc-windows-msvc
            binary: klint-rs.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal

      - name: Install Rust target
        run: rustup target add ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: native-${{ matrix.rust-target }}
          workspaces: |
            . -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native binary
        run: cargo build -p klint-rs --release --target ${{ matrix.rust-target }}

      - name: Stage native package binary
        run: bun tests/stage-native-binary.ts --package ${{ matrix.package }} --source target/${{ matrix.rust-target }}/release/${{ matrix.binary }}

      - name: Upload native package binary
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.package }}
          path: npm/native/${{ matrix.package }}/bin/*
          if-no-files-found: error

  python-wheel:
    name: python wheel (${{ matrix.package }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            binary: klint-rs
          - os: macos-latest
            package: darwin-arm64
            rust-target: aarch64-apple-darwin
            binary: klint-rs
          - os: macos-latest
            package: darwin-x64
            rust-target: x86_64-apple-darwin
            binary: klint-rs
          - os: windows-latest
            package: win32-x64
            rust-target: x86_64-pc-windows-msvc
            binary: klint-rs.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal

      - name: Install Rust target
        run: rustup target add ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: python-wheel-${{ matrix.rust-target }}
          workspaces: |
            . -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native binary
        run: cargo build -p klint-rs --release --target ${{ matrix.rust-target }}

      - name: Stage Python wheel binary
        run: bun tests/stage-python-wheel.ts --source target/${{ matrix.rust-target }}/release/${{ matrix.binary }}

      - name: Smoke Python wheel
        run: bun tests/smoke-python-wheel.ts

      - name: Upload Python wheel
        uses: actions/upload-artifact@v7
        with:
          name: python-wheel-${{ matrix.package }}
          path: python/dist/*.whl
          if-no-files-found: error

  release:
    needs: [test, native]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download native darwin-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: native-darwin-arm64
          path: npm/native/darwin-arm64/bin

      - name: Download native darwin-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: native-darwin-x64
          path: npm/native/darwin-x64/bin

      - name: Download native linux-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: npm/native/linux-x64/bin

      - name: Download native win32-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: native-win32-x64
          path: npm/native/win32-x64/bin

      - name: Release
        run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
