# yaml-language-server: $schema=./klint.schema.json

include: ["**/*.ts", "!tests/**", "!node_modules/**"]
rules:
  no-unguarded-json-parse: error
  no-floating-promise: error
  no-misused-promises: error
  no-date-equality: error
  no-optional-chain-on-non-nullable: error
  no-object-in-template: error
  no-nested-template-literals: error
  no-string-match: error
  no-consecutive-array-push: error

arch:
  layers:
    core:    ["core/**"]
    rules:   ["rules/**"]
    plugins: ["plugins/**"]
    cli:     ["cli.ts"]

  imports:
    - from: [core, rules, plugins]
      deny: cli
      message: "Library layers must not import from the CLI — the dependency flows one way."

  forbidden:
    - pattern: "console.log("
      in: [core, rules, plugins]
      message: "console.log in library code corrupts --json output — delegate all output to the CLI."
    - pattern: "console.error("
      in: [core, rules, plugins]
      message: "console.error in library code corrupts --json output — delegate all output to the CLI."

  singleton:
    - pattern: "process.exit("
      only: "cli.ts"
      in: [core, rules, plugins]
      message: "process.exit() in a library layer terminates the host — only the CLI may exit."
