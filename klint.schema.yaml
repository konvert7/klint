$schema: http://json-schema.org/draft-07/schema#
$id: https://klint.dev/schema.json
type: object
properties:
  $schema:
    description: JSON Schema reference. Use ./klint.schema.json for local validation or https://klint.dev/schema.json for
      the published schema.
    type: string
  root:
    description: Root directory used to resolve include paths and report relative file names. Defaults to the directory
      containing klint.config.json.
    type: string
  include:
    description: 'Glob patterns selecting which TypeScript files to lint. Prefix with ! to exclude. Defaults to ["."] which
      lints all .ts files under root. Example: ["src", "klint", "!**/node_modules/**"]'
    type: array
    items:
      type: string
  plugins:
    description: 'Named rule bundles to enable. Each plugin applies a default set of rules at "error" severity. Individual
      rules from the bundle can be overridden or silenced via the rules map. Available: "sonar".'
    type: array
    items:
      type: string
      enum:
        - sonar
  rules:
    description: 'Map of rule name → severity or options. Example: { "no-floating-promise": "error", "no-sync-in-async": {
      "severity": "warn", "include": ["src/hooks/**"] } }.'
    type: object
    properties:
      no-unguarded-json-parse:
        description: Flags `JSON.parse()` calls that aren't wrapped in try/catch — malformed input crashes the process.
        examples:
          - "no-unguarded-json-parse: error"
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
      no-sync-in-async:
        description: Flags synchronous I/O (`readFileSync`, `execSync`, etc.) inside async functions — blocks the event loop
          when an async equivalent is available.
        examples:
          - "no-sync-in-async: error"
          - |-
            no-sync-in-async:
              severity: warn
              include: ["src/server/**"]
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
      no-floating-promise:
        description: Flags Promise-returning expressions that aren't awaited or `.catch()`-handled — silent failures and
          unpredictable execution order.
        examples:
          - "no-floating-promise: error"
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
      no-misused-promises:
        description: Flags Promises passed where the type expects a non-thenable (e.g. an `if` condition, a `void` callback).
          The Promise's truthiness — not its resolved value — drives the branch.
        examples:
          - "no-misused-promises: error"
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
      no-async-predicate:
        description: Flags `async` functions passed to `.filter`/`.some`/`.every`/`.find`/`.findIndex`. Array methods coerce the
          returned promise to truthy, so every element appears to match.
        examples:
          - "no-async-predicate: error"
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
      no-date-equality:
        description: Flags `Date` comparisons with `==`/`===`/`!=`/`!==` — these compare object identity, not the time value.
          Use `.getTime()` instead.
        examples:
          - "no-date-equality: error"
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
      no-optional-chain-on-non-nullable:
        description: Flags `?.` on receivers whose static type cannot be `null` or `undefined`. The optional chain is dead code
          and obscures the real shape.
        examples:
          - "no-optional-chain-on-non-nullable: warn"
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
      no-object-in-template:
        description: Flags non-primitive objects interpolated into template literals — produces `[object Object]` unless
          `toString()` is overridden.
        examples:
          - "no-object-in-template: error"
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
      no-nested-template-literals:
        description: Flags template literals nested inside template literals — almost always unreadable; extract to a variable.
        examples:
          - "no-nested-template-literals: warn"
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
      no-consecutive-array-push:
        description: Flags consecutive `arr.push(x); arr.push(y);` calls — combine into `arr.push(x, y)` or `arr.push(...items)`.
        examples:
          - "no-consecutive-array-push: warn"
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
      no-string-match:
        description: Flags `String#match` — prefer `.matchAll()` for iteration or `.test()` for boolean checks. `.match()`
          returns different shapes depending on the `/g` flag.
        examples:
          - "no-string-match: error"
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
      sonar/prefer-string-replaceall:
        description: Flags `.replace(/x/g, y)` on strings — `.replaceAll('x', y)` is clearer and faster for all-occurrence
          replacements.
        examples:
          - "sonar/prefer-string-replaceall: error"
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
      sonar/prefer-string-raw-regexp:
        description: Flags regex literals built from escape-heavy string concatenation — `String.raw` drops the double backslashes.
        examples:
          - "sonar/prefer-string-raw-regexp: warn"
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
      sonar/prefer-string-raw:
        description: Flags string literals with multiple backslash escapes — `String.raw` is more readable (Windows paths, regex
          source, etc.).
        examples:
          - "sonar/prefer-string-raw: warn"
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
      sonar/prefer-nullish-coalescing-assign:
        description: Flags `x = x ?? y` patterns — `x ??= y` is the dedicated nullish assignment operator.
        examples:
          - "sonar/prefer-nullish-coalescing-assign: warn"
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
      sonar/no-single-char-class:
        description: Flags single-character character classes in regex (e.g. `/[a]/`) — drop the brackets; the regex matches the
          same.
        examples:
          - "sonar/no-single-char-class: warn"
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
      sonar/prefer-at:
        description: Flags negative-index access via `arr[arr.length - 1]` — `.at(-1)` reads cleaner for last-element access.
        examples:
          - "sonar/prefer-at: warn"
        anyOf:
          - type: string
            enum:
              - error
              - warn
              - off
            description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
          - type: object
            properties:
              severity:
                type: string
                enum:
                  - error
                  - warn
                  - off
                description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
              include:
                description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                  "!src/hooks/scripts/**"]'
                type: array
                items:
                  type: string
            additionalProperties: false
            description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
    additionalProperties:
      anyOf:
        - type: string
          enum:
            - error
            - warn
            - off
          description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
        - type: object
          properties:
            severity:
              type: string
              enum:
                - error
                - warn
                - off
              description: Rule severity. "error" exits with code 2; "warn" reports but exits 0; "off" silences.
            include:
              description: 'Glob patterns scoping this rule to a subset of files. Prefix with ! to exclude. Example: ["src/hooks/**",
                "!src/hooks/scripts/**"]'
              type: array
              items:
                type: string
          additionalProperties: false
          description: Rule options object. Omit severity to default to "error". Add include to scope the rule to specific files.
  arch:
    type: object
    properties:
      layers:
        type: object
        propertyNames:
          type: string
        additionalProperties:
          type: array
          items:
            type: string
        description: Named architectural zones. Keys are arbitrary layer names; values are glob patterns matching the files in
          that layer. Other arch rules reference these names instead of repeating globs.
        examples:
          - |-
            layers:
              core:   ["src/hooks/lib/**", "src/tools/**"]
              skills: ["assets/skills/**"]
              dao:    ["src/dao/**"]
      imports:
        description: Import-boundary rules. The dependency graph your README claims you have.
        type: array
        items:
          type: object
          properties:
            from:
              anyOf:
                - type: string
                - type: array
                  items:
                    type: string
              description: Source — a layer name or glob(s) for the files this rule applies to. Imports originating in `from` are
                checked against `deny`/`allow`.
            deny:
              description: Layer name(s) or glob(s) the source is not allowed to import from. Mutually exclusive in spirit with
                `allow` (use one or the other).
              anyOf:
                - type: string
                - type: array
                  items:
                    type: string
            allow:
              description: Allowlist of layer name(s) / glob(s) the source may import from. Anything not matching `allow` is denied.
              anyOf:
                - type: string
                - type: array
                  items:
                    type: string
            type-only:
              description: When set to "allow", `import type` statements that would otherwise be denied are permitted. Useful for
                type-only references across layers.
              type: string
              const: allow
            message:
              description: Custom error message reported when the rule is violated. Shown in the agent's event stream alongside
                file:line.
              type: string
            severity:
              type: string
              enum:
                - error
                - warn
              description: Severity for the arch rule. "error" exits with code 2; "warn" reports but exits 0. (arch rules cannot be
                "off" — remove the entry instead.)
          required:
            - from
          additionalProperties: false
          description: An import-boundary rule. Restricts which layers a source can or cannot import from.
          examples:
            - |-
              arch:
                imports:
                  - from: skills
                    deny: core
                    message: "Skills must be self-contained and portable"
                    severity: warn
            - |-
              arch:
                imports:
                  - from: ["src/dao/**"]
                    allow: ["src/dao/**", "src/prisma/**", "src/types/**"]
      forbidden:
        description: Forbidden-pattern rules. Block literal strings scoped to a layer.
        type: array
        items:
          anyOf:
            - type: object
              properties:
                pattern:
                  type: string
                  description: Literal substring to search for in source. No regex — exact substring match (e.g. `console.log(`).
                in:
                  anyOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                  description: Layer name(s) or glob(s) the pattern is forbidden in. Files outside the scope are not checked.
                message:
                  type: string
                  description: Required error message explaining why the pattern is forbidden. Shown to the agent so it can fix the call
                    site.
                severity:
                  type: string
                  enum:
                    - error
                    - warn
                  description: Severity for the arch rule. "error" exits with code 2; "warn" reports but exits 0. (arch rules cannot be
                    "off" — remove the entry instead.)
              required:
                - pattern
                - in
                - message
              additionalProperties: false
            - type: object
              properties:
                jsx-element:
                  anyOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                  description: JSX intrinsic element name(s) to forbid (e.g. `button`, `input`, `label`). AST-matched on opening and
                    self-closing tag names — robust to whitespace, attributes, and naming collisions like
                    `<buttonGroup>`.
                in:
                  anyOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                  description: Layer name(s) or glob(s) the element is forbidden in. Files outside the scope are not checked.
                message:
                  type: string
                  description: Required error message explaining why the raw element is forbidden. Typically points at the design-system
                    replacement (e.g. `Use <Button /> from @/components/ui/button`).
                severity:
                  type: string
                  enum:
                    - error
                    - warn
                  description: Severity for the arch rule. "error" exits with code 2; "warn" reports but exits 0. (arch rules cannot be
                    "off" — remove the entry instead.)
              required:
                - jsx-element
                - in
                - message
              additionalProperties: false
          description: A forbidden-pattern rule. Blocks either a literal substring (`pattern:`) or a JSX element (`jsx-element:`)
            inside specific layers.
          examples:
            - |-
              arch:
                forbidden:
                  - pattern: "console.log("
                    in: core
                    message: "Leaks into the agent event stream"
            - |-
              arch:
                forbidden:
                  - jsx-element: ["button", "input", "label"]
                    in: ["src/app/**/*.tsx", "src/components/**/*.tsx", "!src/components/ui/**"]
                    message: "Use the design-system primitives in @/components/ui/* instead of raw HTML elements."
      singleton:
        description: Singleton-location rules. Pin a pattern to one file; every other touch is a violation.
        type: array
        items:
          anyOf:
            - type: object
              properties:
                pattern:
                  type: string
                  description: Literal substring whose appearance is allowed only at one location. Exact substring match (e.g.
                    `process.env.API_KEY`).
                only:
                  type: string
                  description: The single file path where this pattern is allowed. Every other occurrence becomes a violation.
                in:
                  description: Optional scope. Limit the scan to these layers/globs; defaults to all files in `include`.
                  anyOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                message:
                  type: string
                severity:
                  type: string
                  enum:
                    - error
                    - warn
                  description: Severity for the arch rule. "error" exits with code 2; "warn" reports but exits 0. (arch rules cannot be
                    "off" — remove the entry instead.)
              required:
                - pattern
                - only
                - message
              additionalProperties: false
            - type: object
              properties:
                jsx-element:
                  anyOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                  description: JSX intrinsic element name(s) allowed only inside the `only` file. AST-matched on tag names.
                only:
                  type: string
                  description: The single file path where the element is allowed (typically the design-system primitive that wraps it).
                in:
                  anyOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                  description: Either a single layer name / glob pattern or an array of them. Layer names defined in `arch.layers` are
                    resolved to their glob lists.
                message:
                  type: string
                severity:
                  type: string
                  enum:
                    - error
                    - warn
                  description: Severity for the arch rule. "error" exits with code 2; "warn" reports but exits 0. (arch rules cannot be
                    "off" — remove the entry instead.)
              required:
                - jsx-element
                - only
                - message
              additionalProperties: false
          description: A singleton-location rule. Pins a pattern or JSX element to exactly one file — the only honest way to
            enforce a module of record or a design-system primitive.
          examples:
            - |-
              arch:
                singleton:
                  - pattern: "process.env.API_KEY"
                    only: "src/lib/auth.ts"
                    message: "API key access must funnel through the auth module."
            - |-
              arch:
                singleton:
                  - jsx-element: "button"
                    only: "src/components/ui/button.tsx"
                    in: ["src/**/*.tsx"]
                    message: "Raw <button> belongs only to the Button primitive."
    additionalProperties: false
    description: Architecture-as-Code constraints — layers, import boundaries, forbidden patterns, singleton locations.
      Enforced by the arch engine alongside the rule set.
additionalProperties: false
description: klint configuration. Lives at klint.yaml (or klint.config.json) next to biome.json and knip.json.
